name: build-windows

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # required for action-gh-release to upload assets

# Skip macOS-style code-signing on Windows runners (no cert anyway). Set at
# workflow level so every step inherits these defaults.
env:
  CSC_IDENTITY_AUTO_DISCOVERY: 'false'
  ELECTRON_BUILDER_DISABLE_CODE_SIGNING: 'true'
  # Force npm/yarn to use a writable cache on the runner
  npm_config_cache: ${{ github.workspace }}\.npm-cache

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          # NOTE: caching intentionally disabled — works whether or not yarn.lock is present

      - name: Show tool versions
        run: |
          node --version
          yarn --version
          npx --version
        shell: pwsh

      - name: Install deps
        # Falls back gracefully if yarn.lock is missing on the runner.
        # `--network-timeout` avoids flaky network failures killing the build.
        run: |
          if (Test-Path yarn.lock) {
            yarn install --frozen-lockfile --network-timeout 600000
          } else {
            Write-Host "No yarn.lock found - running fresh install"
            yarn install --network-timeout 600000
          }
        shell: pwsh

      - name: Build renderer (Vite)
        run: yarn build:renderer

      - name: Verify renderer output exists
        run: |
          if (-not (Test-Path dist-renderer\index.html)) {
            Write-Error "dist-renderer/index.html missing - Vite build failed silently"
            exit 1
          }
          Write-Host "Renderer OK"
        shell: pwsh

      - name: Bake Discord App ID into build (if secret is set)
        if: env.NEOLIB_DISCORD_APP_ID != ''
        shell: pwsh
        env:
          NEOLIB_DISCORD_APP_ID: ${{ secrets.NEOLIB_DISCORD_APP_ID }}
        run: |
          $id = $env:NEOLIB_DISCORD_APP_ID
          $content = "module.exports = { DISCORD_APP_ID: '" + $id + "' };"
          Set-Content -Path electron/discord-config.js -Value $content -Encoding UTF8
          Write-Host "Discord App ID baked into electron/discord-config.js"

      - name: Build NSIS installer (verbose)
        # `--publish never` prevents electron-builder from trying to talk to GH releases
        # mid-build (we attach assets via action-gh-release in a later step instead).
        run: npx --no-install electron-builder --win --x64 --publish never
        env:
          DEBUG: electron-builder
          NEOLIB_DISCORD_APP_ID: ${{ secrets.NEOLIB_DISCORD_APP_ID }}

      - name: Build portable folder (verbose)
        run: npx --no-install electron-builder --win --dir --x64 --publish never
        env:
          DEBUG: electron-builder
          NEOLIB_DISCORD_APP_ID: ${{ secrets.NEOLIB_DISCORD_APP_ID }}

      - name: List dist contents (debug)
        run: |
          if (Test-Path dist) {
            Get-ChildItem -Path dist -Recurse -Depth 2 | Select-Object FullName,Length
          } else {
            Write-Error "dist/ does not exist - electron-builder failed earlier"
            exit 1
          }
        shell: pwsh

      - name: Zip portable folder
        shell: pwsh
        run: |
          if (-not (Test-Path dist\win-unpacked)) {
            Write-Error "dist/win-unpacked is missing - portable build failed"
            exit 1
          }
          Compress-Archive -Path dist/win-unpacked/* -DestinationPath dist/NEO-LIB-windows-portable.zip -Force

      # Always upload artifacts (visible on every workflow run, even if a later step fails)
      - name: Upload artifacts (Actions tab)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: NEO-LIB-Windows
          path: |
            desktop-app/dist/*.exe
            desktop-app/dist/NEO-LIB-windows-portable.zip
          if-no-files-found: warn

      # Attach installer + portable zip directly to the GitHub Release page.
      # Only runs when the workflow was triggered by a tag push (v*).
      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop-app/dist/*.exe
            desktop-app/dist/NEO-LIB-windows-portable.zip
          fail_on_unmatched_files: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
